name: Automated Cloud API Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  postman-cli-tests:
    name: Run Postman Cloud Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Postman Suite via CLI Action
        uses: postmanlabs/postman-cli-action@v1
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        with:
          command: |
            collection run ${{ secrets.POSTMAN_COLL_ID }} \
              -e ${{ secrets.POSTMAN_ENV_ID }} \
              -r cli,html \
              --reporter-html-export ./report.html

      - name: Upload HTML Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-report
          path: ./report.html
          retention-days: 7

      - name: Stage Dashboard in Dedicated Subfolder
        if: success() && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public/cloud-api
          cp ./report.html public/cloud-api/index.html

      - name: Upload Pages Web Assets
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy Live HTML Report Dashboard
        if: success() && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4