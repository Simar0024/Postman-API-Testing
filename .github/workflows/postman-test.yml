name: Automated Cloud API Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-cloud-api"
  cancel-in-progress: false

jobs:
  postman-cli-tests:
    name: Run Postman Cloud Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Postman Suite via CLI Action
        uses: postmanlabs/postman-cli-action@v1
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        with:
          command: |
            collection run ${{ secrets.POSTMAN_COLL_ID }} \
              -e ${{ secrets.POSTMAN_ENV_ID }} \
              -r cli,html \
              --reporter-html-export ./report.html

      - name: Upload HTML Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-report
          path: ./report.html
          retention-days: 7

      - name: Deploy Cloud Dashboard via Target Branch Merge
        if: success() && github.ref == 'refs/heads/main'
        run: |
          # 1. Establish Git Credentials
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Store the fresh report in a temporary root location
          cp ./report.html ../cloud-api-report.html
          
          # 3. Fetch the remote tracking branches completely
          git fetch origin
          
          # 4. Safely check out or initialize the gh-pages branch locally
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # 5. Create the dedicated subfolder without disturbing anything else
          mkdir -p cloud-api
          mv ../cloud-api-report.html ./cloud-api/index.html
          
          # 6. Commit and Push ONLY this subfolder changes to the branch
          git add cloud-api/index.html
          git commit -m "internal(qa): automated update to cloud-api metrics" || echo "No changes to commit"
          git push origin gh-pages
          
      - name: Request Live GitHub Pages Rebuild Engine
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}