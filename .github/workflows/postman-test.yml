name: Automated Cloud API Testing

on:
  push:
    branches: [ main ]
    # OPTIMIZATION: Only triggers if files inside your postman directory change
    paths:
      - 'tests/postman/cloud/**' 
      - '.github/workflows/postman-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/postman/cloud/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-cloud-api"
  cancel-in-progress: false

jobs:
  postman-cli-tests:
    name: Run Postman Cloud Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Postman Suite via CLI Action
        uses: postmanlabs/postman-cli-action@v1
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        with:
          command: |
            collection run ${{ secrets.POSTMAN_COLL_ID }} \
              -e ${{ secrets.POSTMAN_ENV_ID }} \
              -r cli,html \
              --reporter-html-export ./report.html

      - name: Deploy Cloud Dashboard and Maintain Timestamped History
        if: success() && github.ref == 'refs/heads/main'
        env:
          MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          HUMAN_DATE=$(date +'%b %d, %Y at %I:%M:%S %p UTC')

          cp ./report.html ../cloud-api-report.html
          
          git remote set-url origin "https://x-access-token:${MY_GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          mkdir -p cloud-api
          
          REPORT_FILE="report-${TIMESTAMP}.html"
          mv ../cloud-api-report.html "./cloud-api/$REPORT_FILE"
          
          cd cloud-api
          ls -1 report-*.html | sort -n > sorted_reports.txt
          
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Cloud API Test Reports History</title>
              <style>
                  body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2.5rem; max-width: 800px; margin: 0 auto; }
                  h1 { font-size: 2rem; border-bottom: 2px solid #334155; padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
                  p { color: #94a3b8; margin-bottom: 2rem; }
                  ul { list-style-type: none; padding-left: 0; }
                  li { background-color: #1e293b; margin-bottom: 0.75rem; padding: 1.25rem 1.5rem; border-radius: 8px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
                  a { color: #38bdf8; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
                  a:hover { text-decoration: underline; }
                  .run-meta { display: flex; flex-direction: column; text-align: right; font-size: 0.875rem; color: #94a3b8; }
                  .timestamp-label { font-family: monospace; background: #334155; color: #cbd5e1; padding: 2px 6px; border-radius: 4px; margin-top: 4px; font-size: 0.8rem; }
              </style>
          </head>
          <body>
              <h1>☁️ Cloud API Test Reports History</h1>
              <p>Historical run results organized by execution timestamps (showing up to last 6 entries):</p>
              <ul>
          EOF
          
          tail -n 6 sorted_reports.txt | sort -nr | while read -r file; do
              if [ -n "$file" ]; then
                  RAW_TIME=$(echo "$file" | sed 's/report-\(.*\)\.html/\1/')
                  DISPLAY_TIME=$(echo "$RAW_TIME" | sed -E 's/([0-9]{4})([0-9]{2})([0-9]{2})-([0-9]{2})([0-9]{2})([0-9]{2})/\1-\2-\3 \4:\5:\6/')
                  
                  echo "              <li>" >> index.html
                  echo "                  <a href=\"$file\">📄 Execution Dashboard Report</a>" >> index.html
                  echo "                  <div class=\"run-meta\">Execution Window <span class=\"timestamp-label\">$DISPLAY_TIME UTC</span></div>" >> index.html
                  echo "              </li>" >> index.html
              fi
          done
          
          cat << 'EOF' >> index.html
              </ul>
          </body>
          </html>
          EOF
          
          head -n -6 sorted_reports.txt | xargs -r rm -f
          rm -f sorted_reports.txt
          cd ..
          
          git add cloud-api/
          git commit -m "internal(qa): append cloud-api history metric for timestamp $TIMESTAMP" || echo "No changes to commit"
          
          for i in {1..5}; do
            if git push origin gh-pages; then
              echo "✅ Successfully pushed Cloud timestamp history!"
              break
            else
              echo "⚠️ Conflict detected! Fetching remote changes and rebasing..."
              git fetch origin gh-pages
              git rebase origin/gh-pages || (git rebase --abort && git checkout -f gh-pages)
              sleep $((RANDOM % 5 + 1))
            fi
          done