name: Automated Cloud API Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: "pages-cloud-api"
  cancel-in-progress: false

jobs:
  postman-cli-tests:
    name: Run Postman Cloud Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Postman Suite via CLI Action
        uses: postmanlabs/postman-cli-action@v1
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        with:
          command: |
            collection run ${{ secrets.POSTMAN_COLL_ID }} \
              -e ${{ secrets.POSTMAN_ENV_ID }} \
              -r cli,html \
              --reporter-html-export ./report.html

      - name: Upload HTML Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-report
          path: ./report.html
          retention-days: 7

      - name: Fetch, Merge, and Stage Dashboard on gh-pages Branch
        if: success() && github.ref == 'refs/heads/main'
        run: |
          # 1. Configure local git identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Clone the existing gh-pages branch into a target directory if it exists
          git clone --branch gh-pages https://x-token-auth:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git upstream-pages || mkdir upstream-pages
          
          # 3. Create our isolated subfolder inside the pulled branch directory
          mkdir -p upstream-pages/cloud-api
          
          # 4. Copy the new report into its destination path
          cp ./report.html upstream-pages/cloud-api/index.html
          
          # 5. Move the entire updated tree to our public staging directory
          mkdir -p public
          cp -r upstream-pages/* public/ 2>/dev/null || cp -r upstream-pages/. public/

      - name: Commit and Push Assets to gh-pages Branch
        if: success() && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
          clean: true # Safe to set to true now because we manually merged the folders above!