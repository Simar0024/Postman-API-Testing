name: Products API CI Pipeline Automation

on:
  push:
    branches: [ main ]
    # OPTIMIZATION: Only triggers if files inside your newman/dataset directory change
    paths:
      - 'tests/postman/social-prod.postman_environment.json'
      - 'tests/postman/dataset.json'
      - '.github/workflows/newman-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/postman/dataset.json'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-products-api"
  cancel-in-progress: false

jobs:
  api-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Global Newman, Markdown, & Advanced HTML Reporters
        run: |
          npm install -g newman \
                         newman-reporter-markdown \
                         newman-reporter-htmlextra

      - name: Execute Collection Suite
        id: run-newman
        run: |
          newman run "https://api.getpostman.com/collections/${{ secrets.NEWMAN_COLL_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            -e "https://api.getpostman.com/environments/${{ secrets.NEWMAN_ENV_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            -d ./tests/postman/dataset.json \
            --env-var "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" \
            --env-var "REQRES_ENV_NAME=${{ secrets.REQRES_ENV_NAME }}" \
            --delay-request 500 \
            --disable-unicode \
            --color off \
            -r cli,htmlextra \
            --reporter-htmlextra-export products-report.html \
            --reporter-htmlextra-title "Products CRUD Integration Test Matrix" \
            --reporter-htmlextra-darkTheme

      - name: Deploy Products Dashboard and Maintain Timestamped History
        if: success() && github.ref == 'refs/heads/main'
        env:
          MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Capture a clean, standardized timestamp variable (e.g., 20260610-014522)
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          
          # Stage the fresh report out of the working tree
          cp ./products-report.html ../products-api-report.html
          
          # Set up authenticated remote URL
          git remote set-url origin "https://x-access-token:${MY_GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin
          
          # Check out or initialize gh-pages branch
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # Enter or create subfolder
          mkdir -p products-api
          
          # 2. Save the report file matching the explicit timestamp format
          REPORT_FILE="report-${TIMESTAMP}.html"
          mv ../products-api-report.html "./products-api/$REPORT_FILE"
          
          # Rebuild index.html list of past 6 reports using file creation markers
          cd products-api
          ls -1 report-*.html | sort -n > sorted_reports.txt
          
          # Create HTML History Dashboard
          cat << 'EOF' > index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Products API Test Reports History</title>
              <style>
                  body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 2.5rem; max-width: 800px; margin: 0 auto; }
                  h1 { font-size: 2rem; border-bottom: 2px solid #334155; padding-bottom: 0.5rem; margin-bottom: 0.5rem; }
                  p { color: #94a3b8; margin-bottom: 2rem; }
                  ul { list-style-type: none; padding-left: 0; }
                  li { background-color: #1e293b; margin-bottom: 0.75rem; padding: 1.25rem 1.5rem; border-radius: 8px; border: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
                  a { color: #38bdf8; text-decoration: none; font-weight: 600; font-size: 1.1rem; }
                  a:hover { text-decoration: underline; }
                  .run-meta { display: flex; flex-direction: column; text-align: right; font-size: 0.875rem; color: #94a3b8; }
                  .timestamp-label { font-family: monospace; background: #334155; color: #cbd5e1; padding: 2px 6px; border-radius: 4px; margin-top: 4px; font-size: 0.8rem; }
              </style>
          </head>
          <body>
              <h1>📦 Products API Test Reports History</h1>
              <p>Historical run results organized by execution timestamps (showing up to last 6 entries):</p>
              <ul>
          EOF
          
          # Append list items newest to oldest
          tail -n 6 sorted_reports.txt | sort -nr | while read -r file; do
              if [ -n "$file" ]; then
                  # Extract raw text segment from the filename for visual display
                  RAW_TIME=$(echo "$file" | sed 's/report-\(.*\)\.html/\1/')
                  # Convert YYYYMMDD-HHMMSS to a cleaner display layout
                  DISPLAY_TIME=$(echo "$RAW_TIME" | sed -E 's/([0-9]{4})([0-9]{2})([0-9]{2})-([0-9]{2})([0-9]{2})([0-9]{2})/\1-\2-\3 \4:\5:\6/')
                  
                  echo "              <li>" >> index.html
                  echo "                  <a href=\"$file\">📄 Execution Matrix Dashboard</a>" >> index.html
                  echo "                  <div class=\"run-meta\">Execution Window <span class=\"timestamp-label\">$DISPLAY_TIME UTC</span></div>" >> index.html
                  echo "              </li>" >> index.html
              fi
          done
          
          cat << 'EOF' >> index.html
              </ul>
          </body>
          </html>
          EOF
          
          # Prune old reports, retaining only the newest 6 files on the branch
          head -n -6 sorted_reports.txt | xargs -r rm -f
          rm -f sorted_reports.txt
          cd ..
          
          # Commit and Push
          git add products-api/
          git commit -m "internal(qa): append products-api history metric for timestamp $TIMESTAMP" || echo "No changes to commit"
          
          for i in {1..5}; do
            if git push origin gh-pages; then
              echo "✅ Successfully pushed Products timestamp history!"
              break
            else
              echo "⚠️ Conflict detected! Fetching remote changes and rebasing..."
              git fetch origin gh-pages
              git rebase origin/gh-pages || (git rebase --abort && git checkout -f gh-pages)
              sleep $((RANDOM % 5 + 1))
            fi
          done