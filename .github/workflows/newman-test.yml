name: Products API CI Pipeline Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-products-api"
  cancel-in-progress: false

jobs:
  api-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Global Newman, Markdown, & Advanced HTML Reporters
        run: |
          npm install -g newman \
                         newman-reporter-markdown \
                         newman-reporter-htmlextra

      - name: Initialize Dashboard Step Summary Header
        run: |
          echo "## 📊 Products API Automation Test Matrix" >> $GITHUB_STEP_SUMMARY
          echo "* **Run Triggered By:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Branch Context:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

      - name: Execute Collection Suite
        id: run-newman
        run: |
          newman run "https://api.getpostman.com/collections/${{ secrets.NEWMAN_COLL_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            -e "https://api.getpostman.com/environments/${{ secrets.NEWMAN_ENV_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            -d ./tests/postman/dataset.json \
            --env-var "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" \
            --env-var "REQRES_ENV_NAME=${{ secrets.REQRES_ENV_NAME }}" \
            --delay-request 500 \
            --disable-unicode \
            --color off \
            -r cli,markdown,htmlextra \
            --reporter-markdown-export text.md \
            --reporter-htmlextra-export newman-report.html \
            --reporter-htmlextra-title "Products CRUD Integration Test Matrix" \
            --reporter-htmlextra-darkTheme

      - name: Publish Test Report Matrix to Dashboard
        if: always()
        run: |
          if [ -f text.md ]; then
            cat text.md >> $GITHUB_STEP_SUMMARY
            echo -e "\n\n### 📂 Advanced HTML Report Generated" >> $GITHUB_STEP_SUMMARY
            echo "Download the **newman-html-dashboard** artifact from the summary actions panel above to inspect body bodies, tokens, and data validation graphs." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Newman execution failed before generating a report file." >> $GITHUB_STEP_SUMMARY
          fi 

      - name: Upload HTML Dashboard Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-dashboard
          path: newman-report.html
          retention-days: 7

      - name: Deploy Products Dashboard via Target Branch Merge
        if: success() && github.ref == 'refs/heads/main'
        run: |
          # 1. Establish Git Credentials
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Store the fresh report in a temporary root location
          cp ./newman-report.html ../products-api-report.html
          
          # 3. Fetch the remote tracking branches completely
          git fetch origin
          
          # 4. Safely check out or initialize the gh-pages branch locally
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # 5. Create the dedicated subfolder without disturbing anything else
          mkdir -p products-api
          mv ../products-api-report.html ./products-api/index.html
          
          # 6. Commit and Push ONLY this subfolder changes to the branch
          git add products-api/index.html
          git commit -m "internal(qa): automated update to products-api metrics" || echo "No changes to commit"
          git push origin gh-pages

      - name: Request Live GitHub Pages Rebuild Engine
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}