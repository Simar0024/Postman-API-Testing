name: Products API CI Pipeline Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Global Newman & Markdown Reporter
        run: npm install -g newman newman-reporter-markdown

      - name: Initialize Dashboard Step Summary Header
        run: |
          echo "## 📊 Products API Automation Test Matrix" >> $GITHUB_STEP_SUMMARY
          echo "* **Run Triggered By:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Commit SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY

      - name: Execute Collection Suite
        id: run-newman
        run: |
          newman run ./tests/postman/CRUD-Chain.postman_collection.json \
            -e ./tests/postman/social-prod.postman_environment.json \
            --env-var "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" \
            --delay-request 500 \
            --disable-unicode \
            --color off \
            -r cli,markdown \
            --reporter-markdown-export text.md
          
      - name: Publish Test Report Matrix to Dashboard
        if: always()
        run: |
          # If the markdown file was generated, append it directly onto the GitHub summary landing page
          if [ -f text.md ]; then
            cat text.md >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Newman execution failed before generating a report file." >> $GITHUB_STEP_SUMMARY
          fi