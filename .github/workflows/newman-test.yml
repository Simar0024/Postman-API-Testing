name: Products API CI Pipeline Automation

on:
  push:
    branches: [ main ]
    # OPTIMIZATION: Only triggers if files inside your newman/dataset directory change
    paths:
      - 'tests/postman/social-prod.postman_environment.json'
      - 'tests/postman/dataset.json'
      - '.github/workflows/newman-test.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tests/postman/dataset.json'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-products-api"
  cancel-in-progress: false

jobs:
  api-integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Install Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Global Newman, Markdown, & Advanced HTML Reporters
        run: |
          npm install -g newman \
                         newman-reporter-markdown \
                         newman-reporter-htmlextra

      - name: Execute Collection Suite
        id: run-newman
        run: |
          newman run "https://api.getpostman.com/collections/${{ secrets.NEWMAN_COLL_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            -e "https://api.getpostman.com/environments/${{ secrets.NEWMAN_ENV_ID }}?apikey=${{ secrets.POSTMAN_API_KEY }}" \
            -d ./tests/postman/dataset.json \
            --env-var "REQRES_API_KEY=${{ secrets.REQRES_API_KEY }}" \
            --env-var "REQRES_ENV_NAME=${{ secrets.REQRES_ENV_NAME }}" \
            --delay-request 500 \
            --disable-unicode \
            --color off \
            -r cli,htmlextra \
            --reporter-htmlextra-export products-report.html \
            --reporter-htmlextra-title "Products CRUD Integration Test Matrix" \
            --reporter-htmlextra-darkTheme

      - name: Deploy Products Dashboard via Resilient Target Branch Merge
        if: success() && github.ref == 'refs/heads/main'
        env:
          MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Save the report out of the working tree
          cp ./products-report.html ../products-api-report.html
          
          # Set up secure authenticated remote URL
          git remote set-url origin "https://x-access-token:${MY_GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git fetch origin
          
          # Checkout or establish gh-pages branch
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          
          # Inject file updates into our dedicated subfolder
          mkdir -p products-api
          mv ../products-api-report.html ./products-api/index.html
          git add products-api/index.html
          git commit -m "internal(qa): automated update to products-api metrics" || echo "No changes to commit"
          
          # RESILIENT LOOP: If another pipeline pushed first, pull, rebase, and retry up to 5 times
          for i in {1..5}; do
            if git push origin gh-pages; then
              echo "✅ Successfully pushed to gh-pages branch!"
              break
            else
              echo "⚠️ Conflict detected! Fetching latest remote changes and rebasing..."
              git fetch origin gh-pages
              git rebase origin/gh-pages || (git rebase --abort && git checkout -f gh-pages && mkdir -p products-api && cp ./products-api/index.html ./products-api/index.html)
              sleep $((RANDOM % 5 + 1)) # Random back-off delay to let the competing pipeline finish
            fi
          done

      - name: Request Live GitHub Pages Rebuild Engine
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}