name: Automated Cloud API Testing

# Controls when the workflow will run
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  postman-cli-tests:
    name: Run Postman Cloud Automation Suite
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code into the runner environment
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install and execute Postman CLI natively via the official action
      - name: Execute Postman Suite via CLI Action
        uses: postmanlabs/postman-cli-action@v1
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        with:
          # Use the 'command' block to communicate directly with the binary engine wrapper
          command: |
            collection run "${{ secrets.POSTMAN_COLL_ID }}" \
              -e "${{ secrets.POSTMAN_ENV_ID }}" \
              -r cli,html \
              --reporter-html-export ./report.html \
              --insecure

      # Step 3: Save the generated HTML report so you can download it from the GitHub GUI
      - name: Upload HTML Report Artifact
        if: always() # This ensures your validation report saves even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-report
          path: ./report.html