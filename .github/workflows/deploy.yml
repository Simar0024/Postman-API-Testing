name: Automated Cloud API Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  postman-cli-tests:
    name: Run Postman Cloud Automation Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Execute Postman Suite via CLI Action
        uses: postmanlabs/postman-cli-action@v1
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
        with:
          # REMOVED the literal double-quotes around the secrets context brackets below:
          command: |
            collection run ${{ secrets.POSTMAN_COLL_ID }} \
              -e ${{ secrets.POSTMAN_ENV_ID }} \
              -r cli,html \
              --reporter-html-export ./report.html \
              --insecure

      # This saves the HTML report when the run is complete
      - name: Upload HTML Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-api-test-report
          path: ./report.html